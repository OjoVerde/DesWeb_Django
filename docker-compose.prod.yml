  djangoapi:
    restart: "always"
    #the folder of the Django project
    build: 
      context: docker_files/config_django
      args:
        - USER_ID=${DJANGOAPI_USER_ID}
        - GROUP_ID=${DJANGOAPI_GROUP_ID}
        - USERNAME=${DJANGOAPI_USERNAME}

    command: python djangoapi/manage.py runserver 0.0.0.0:8000
    volumes:
      - ./django_project:/usr/src/app:Z
      - ./workspace:/workspace
    ports:
      - "${GEOMATICA_UPV_DJANGO_API_FORWARDED_PORT}:8000"
      #puerto para depuración remota, al poner djangoapi.settings.REMOTE_DEBUG = True
      - 6789:6789
    env_file:
      - .env.prod
    networks:
      - joamona-dj-api_postgis

    #to ckeck if postgres is already ready. This service
    #will not start up to the posgis service is ready
    # depends_on:
    #   postgis:
    #     condition: service_healthy
networks:
   joamona-dj-api_postgis:
      driver: bridge
      external: true
#coment
volumes:
  postgis-data:
    driver: local

